<!-- @dsCard group="Type" viewport="700x230" name="Display — Cormorant Garamond" subtitle="Elegant high-contrast serif for hero & display" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 24px 28px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .specimen { font-family: var(--font-display); color: var(--text-strong); line-height: 1.02; letter-spacing: -.01em; }
  .a { font-size: 60px; font-weight: 500; }
  .b { font-size: 38px; font-weight: 500; margin-top: 10px; }
</style>
</head>
<body>
  <div class="specimen a">Tight lines, blue water</div>
  <div class="meta">display-xl · 500 · clamp(56–96px)</div>
  <div class="specimen b" style="font-style:italic; font-weight:400;">The pursuit of what is elusive</div>
  <div class="meta">display-m · 400 italic</div>
</body>
</html>
