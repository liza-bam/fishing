<!-- @dsCard group="Colors" viewport="700x190" name="Ocean" subtitle="Deep sea, lagoon & surf — the core marine palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px 24px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 78px; border-radius: var(--radius-md); border: 1px solid var(--hairline); }
  .nm { font-size: 13px; font-weight: 700; color: var(--text-strong); margin-top: 10px; letter-spacing: .01em; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-deep-sea)"></div><div class="nm">Deep Sea</div><div class="hex">#0C3F45</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-deep-sea-900)"></div><div class="nm">Deep Sea 900</div><div class="hex">#06262B</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-lagoon)"></div><div class="nm">Lagoon</div><div class="hex">#2C7E88</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-lagoon-400)"></div><div class="nm">Lagoon 400</div><div class="hex">#4FA0AA</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-surf)"></div><div class="nm">Surf</div><div class="hex">#BFE0DE</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-mist)"></div><div class="nm">Mist</div><div class="hex">#E3EEEC</div></div>
  </div>
</body>
</html>
