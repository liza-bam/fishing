<!-- @dsCard group="Colors" viewport="700x210" name="Semantic Roles" subtitle="How colour maps to surfaces, text and action" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile { border-radius: var(--radius-md); padding: 16px 18px; border: 1px solid var(--hairline); min-height: 64px; display:flex; flex-direction:column; justify-content:center; }
  .role { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; opacity:.65; }
  .val { font-family: var(--font-mono); font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile" style="background:var(--surface-page); color:var(--text-strong)"><span class="role">surface-page</span><span class="val">Shell · default canvas</span></div>
    <div class="tile" style="background:var(--surface-deep); color:var(--text-on-dark)"><span class="role" style="opacity:.8">surface-deep</span><span class="val">Deep Sea · dark sections</span></div>
    <div class="tile" style="background:var(--surface-sand); color:var(--text-strong)"><span class="role">surface-sand</span><span class="val">Sand · warm panels</span></div>
    <div class="tile" style="background:var(--action-bg); color:var(--action-fg)"><span class="role" style="opacity:.85">action-bg</span><span class="val">Coral · primary CTA</span></div>
    <div class="tile" style="background:var(--surface-card); color:var(--text-body)"><span class="role">text-body</span><span class="val">on card · #2C3A37</span></div>
    <div class="tile" style="background:var(--surface-card); color:var(--text-muted)"><span class="role">text-muted</span><span class="val">secondary · #61706C</span></div>
  </div>
</body>
</html>
