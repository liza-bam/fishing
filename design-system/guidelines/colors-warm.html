<!-- @dsCard group="Colors" viewport="700x190" name="Land & Warmth" subtitle="Shell, sand and the single coral accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px 24px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 78px; border-radius: var(--radius-md); border: 1px solid var(--hairline); }
  .nm { font-size: 13px; font-weight: 700; color: var(--text-strong); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-shell)"></div><div class="nm">Shell</div><div class="hex">#F7F2E9</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-sand)"></div><div class="nm">Sand</div><div class="hex">#E7DCC8</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-sand-deep)"></div><div class="nm">Sand Deep</div><div class="hex">#D8C9AE</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-coral)"></div><div class="nm">Coral</div><div class="hex">#CB6843</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-coral-600)"></div><div class="nm">Coral 600</div><div class="hex">#B5572F</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-coral-100)"></div><div class="nm">Coral 100</div><div class="hex">#F3DFD3</div></div>
  </div>
</body>
</html>
