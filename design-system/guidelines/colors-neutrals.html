<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals" subtitle="Slightly green-grey neutral ramp, 50 → 950" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px 24px; }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--hairline); }
  .nm { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-neutral-50)"></div><div class="nm">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-100)"></div><div class="nm">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-200)"></div><div class="nm">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-300)"></div><div class="nm">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-400)"></div><div class="nm">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-500)"></div><div class="nm">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-600)"></div><div class="nm">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-700)"></div><div class="nm">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-800)"></div><div class="nm">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-900)"></div><div class="nm">900</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-neutral-950)"></div><div class="nm">950</div></div>
  </div>
</body>
</html>
