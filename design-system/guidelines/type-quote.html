<!-- @dsCard group="Type" viewport="700x260" name="Eyebrow & Quote" subtitle="Tracked eyebrow + restrained serif pull-quote with coral rule" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 26px 28px; max-width: 660px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin: 8px 0 26px; }
  .rule { width: 44px; height: 3px; background: var(--c-coral); border-radius: 2px; margin-bottom: 20px; }
  .attr { margin-top: 18px; font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--brand-secondary); }
</style>
</head>
<body>
  <div class="bx-eyebrow">Offshore Charter · Full Day</div>
  <div class="meta">eyebrow · 12px · 700 · tracking .18em · uppercase</div>

  <div class="rule"></div>
  <p class="bx-quote">The charm of fishing is that it is the pursuit of what is elusive but attainable.</p>
  <div class="attr">John Buchan</div>
  <div class="meta" style="margin-top:14px">quote · Georgia serif · italic 400 · coral rule · no quote marks</div>
</body>
</html>
