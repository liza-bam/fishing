<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 24px; }
  .row { display: flex; gap: 18px; }
  .item { text-align: center; }
  .box { width: 92px; height: 72px; background: var(--c-mist); border: 1.5px solid var(--c-lagoon); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · 14</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lab">pill</div></div>
  </div>
</body>
</html>
