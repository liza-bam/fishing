<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px 28px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin: 2px 0 14px; }
  h1,h2,h3 { margin: 0; }
</style>
</head>
<body>
  <h1>Offshore from San Cristóbal</h1>
  <div class="meta">H1 · display · 600 · clamp(32–44px)</div>
  <h2>Captains who know the grounds</h2>
  <div class="meta">H2 · display · 600 · clamp(26–34px)</div>
  <h3>Marlin over the seamounts</h3>
  <div class="meta">H3 · display · 600 · clamp(21–26px)</div>
</body>
</html>
