<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px-based rhythm, space-1 → space-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px 24px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--c-lagoon); border-radius: var(--radius-sm); width: 100%; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .px { font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:34px"><div class="bar" style="height:4px"></div><div class="lab">1</div><div class="px">4</div></div>
    <div class="item" style="width:34px"><div class="bar" style="height:8px"></div><div class="lab">2</div><div class="px">8</div></div>
    <div class="item" style="width:34px"><div class="bar" style="height:12px"></div><div class="lab">3</div><div class="px">12</div></div>
    <div class="item" style="width:40px"><div class="bar" style="height:16px"></div><div class="lab">4</div><div class="px">16</div></div>
    <div class="item" style="width:44px"><div class="bar" style="height:24px"></div><div class="lab">5</div><div class="px">24</div></div>
    <div class="item" style="width:48px"><div class="bar" style="height:32px"></div><div class="lab">6</div><div class="px">32</div></div>
    <div class="item" style="width:52px"><div class="bar" style="height:40px"></div><div class="lab">7</div><div class="px">40</div></div>
    <div class="item" style="width:56px"><div class="bar" style="height:48px"></div><div class="lab">8</div><div class="px">48</div></div>
    <div class="item" style="width:64px"><div class="bar" style="height:64px"></div><div class="lab">9</div><div class="px">64</div></div>
    <div class="item" style="width:72px"><div class="bar" style="height:80px"></div><div class="lab">10</div><div class="px">80</div></div>
  </div>
</body>
</html>
