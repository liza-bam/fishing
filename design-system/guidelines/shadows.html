<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Soft, low, diffused shadows — quiet chrome" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 28px 24px; }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { text-align: center; }
  .box { width: 110px; height: 76px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lab">xl</div></div>
  </div>
</body>
</html>
