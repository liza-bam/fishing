<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 26px 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; align-items: start; }
  .panel { display: grid; gap: 16px; }
  .deep { background: var(--surface-deep); border-radius: var(--radius-lg); padding: 24px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const { Input, Select } = window.BelugaGalapagosDesignSystem_fd3494;
function Demo() {
  return (
    <div className="grid">
          <div className="panel">
            <Input label="Full name" placeholder="John Buchan" required />
            <Input label="Email" type="email" placeholder="john@example.com" hint="We'll only use this to reply." />
            <Select label="Anglers" options={['1–2 anglers', '3–4 anglers', '5–6 anglers', 'Group / multiple boats']} />
          </div>
          <div className="panel deep">
            <Input onDark label="Full name" placeholder="John Buchan" />
            <Select onDark label="Target species" options={['Marlin', 'Yellowfin tuna', 'Wahoo', 'Not sure yet']} />
          </div>
        </div>);

}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
</script>
</body>
</html>
